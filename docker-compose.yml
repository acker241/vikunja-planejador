version: "3.8"

# Leantime - Gestor de Projetos
# Deploy local: docker-compose up -d
# Aceder em http://localhost:8080

services:
  leantime:
    image: leantime/leantime:latest
    container_name: leantime
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LEAN_DB_HOST: db
      LEAN_DB_USER: leantime
      LEAN_DB_PASSWORD: ${DB_PASSWORD:-leantime_secret_2026}
      LEAN_DB_DATABASE: leantime
      LEAN_DB_PORT: 3306
      LEAN_SESSION_PASSWORD: ${SESSION_PASSWORD:-sessao_secreta_aleatoria_2026}
      LEAN_APP_URL: ${PUBLIC_URL:-http://localhost:8080}
      LEAN_SITENAME: "Associacao Mondrian"
      # LEAN_MAILER_HOST: smtp.gmail.com
      # LEAN_MAILER_PORT: 587
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: leantime_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret_2026}
      MYSQL_USER: leantime
      MYSQL_PASSWORD: ${DB_PASSWORD:-leantime_secret_2026}
      MYSQL_DATABASE: leantime
    volumes:
      - leantime_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  leantime_db:
